name: Automate Preprocessing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' 

    - name: Install Dependencies Directly
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas matplotlib seaborn scikit-learn plotly yellowbrick kagglehub

    - name: Run preprocessing script
      run: |
        python preprocessing/automate_Srie_Wahyudhanis_Hadis.py

    - name: Move processed data
      run: |
        mv data_preprocessing.csv preprocessing/
        
    - name: Commit processed data
      run: |
        git config --global user.name "ririhadis"
        git config --global user.email "sriewahyudhanis.hadis@gmail.com"

        git add preprocessing/data_preprocessing.csv
        git commit -m 'Berhasil update dataset' || echo 'Dataset gagal diunggah'
        git push
